services:
  mysql:
    image: mysql:8.4
    container_name: airbersih-mysql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - airbersih_internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./repo/agen_ai
      dockerfile: docker/backend/Dockerfile
    container_name: airbersih-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_NAME: ${APP_NAME}
      APP_ENV: ${APP_ENV}
      APP_DEBUG: ${APP_DEBUG}
      APP_URL: ${APP_URL}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE}
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS}
      SESSION_DOMAIN: ${SESSION_DOMAIN}
    expose:
      - "8000"
    volumes:
      - ./repo/agen_ai/backend:/opt/domain-backend:ro
      - ./backend:/var/www/html
    networks:
      - airbersih_internal
      - proxy

  frontend:
    build:
      context: ./repo/agen_ai
      dockerfile: frontend-web/Dockerfile.production
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: airbersih-frontend
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"
    networks:
      - airbersih_internal
      - proxy

volumes:
  mysql_data:

networks:
  airbersih_internal:
    name: airbersih_internal
    driver: bridge
  proxy:
    external: true
    name: proxy
