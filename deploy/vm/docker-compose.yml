services:
  mysql:
    image: mysql:8.4
    container_name: airbersih-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: air_bersih_management
      MYSQL_USER: airbersih
      MYSQL_PASSWORD: airbersih123
      MYSQL_ROOT_PASSWORD: root123
    volumes:
      - airbersih_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - airbersih_internal

  backend:
    build:
      context: /opt/workspace/airbersih/repo/agen_ai
      dockerfile: docker/backend/Dockerfile
    container_name: airbersih-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_NAME: "Air Bersih Management"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: https://api.pelayanan.id
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: air_bersih_management
      DB_USERNAME: airbersih
      DB_PASSWORD: airbersih123
      SANCTUM_STATEFUL_DOMAINS: app.pelayanan.id
      SESSION_DOMAIN: .pelayanan.id
    ports:
      - "18000:8000"
    volumes:
      - /opt/workspace/airbersih/repo/agen_ai/backend:/opt/domain-backend:ro
      - /opt/workspace/airbersih/backend:/var/www/html
    networks:
      - airbersih_internal

  frontend:
    build:
      context: /opt/workspace/airbersih/repo/agen_ai
      dockerfile: deploy/vm/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: https://api.pelayanan.id/api
    container_name: airbersih-frontend
    restart: unless-stopped
    ports:
      - "18080:80"
    networks:
      - airbersih_internal

networks:
  airbersih_internal:
    name: airbersih_internal

volumes:
  airbersih_mysql_data:
